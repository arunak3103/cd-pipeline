apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: my-app
        image: 955030484275.dkr.ecr.us-east-1.amazonaws.com/static-app:v4
        ports:
        - containerPort: 80

